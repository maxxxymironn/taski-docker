name: Main Taski Workflow

# Перечень событий триггеров, при которых запускается воркфлоу
on:
    push:
        branches:
            - main

# Перечень задач
jobs:
    # - Склонировать код и вывести в консоль дерево файлов
    checkout-and-print-tree:
        runs-on: ubuntu-latest
        steps:
            - name: Check out repository code # Имя шага задаём сами
              uses: actions/checkout@v4       # готовое решение берём из библиотеки GitHub Actions
            # Выполняем команду tree
            - name: Print project tree
              run: tree .
